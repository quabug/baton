name: Auto version bump

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  bump:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine bump type from branch name
        id: bump
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          if [[ "$BRANCH" == feat/* ]] || [[ "$BRANCH" == improve/* ]] || [[ "$BRANCH" == feature/* ]]; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif [[ "$BRANCH" == fix/* ]] || [[ "$BRANCH" == bugfix/* ]]; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          elif [[ "$BRANCH" == breaking/* ]] || [[ "$BRANCH" == major/* ]]; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          else
            echo "type=none" >> "$GITHUB_OUTPUT"
          fi
          echo "Branch: $BRANCH -> Bump: $(cat "$GITHUB_OUTPUT" | grep type | cut -d= -f2)"
      - name: Skip if no bump needed
        if: steps.bump.outputs.type == 'none'
        run: echo "No version bump for this branch prefix. Skipping."
      - uses: actions/setup-node@v4
        if: steps.bump.outputs.type != 'none'
        with:
          node-version: 22
      - name: Bump version
        if: steps.bump.outputs.type != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "Bump version to ${VERSION}"
          git push
