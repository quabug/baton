name: Publish to npm

on:
  push:
    branches: [main]
    paths: [package.json]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check if version changed
        id: version
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          OLD_VERSION=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "")
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "old=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip if version unchanged
        if: steps.version.outputs.changed != 'true'
        run: echo "Version unchanged (${{ steps.version.outputs.new }}), skipping publish."
      - uses: pnpm/action-setup@v4
        if: steps.version.outputs.changed == 'true'
      - uses: actions/setup-node@v4
        if: steps.version.outputs.changed == 'true'
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
        if: steps.version.outputs.changed == 'true'
      - run: pnpm install
        if: steps.version.outputs.changed == 'true'
      - run: pnpm test
        if: steps.version.outputs.changed == 'true'
      - run: pnpm build
        if: steps.version.outputs.changed == 'true'
      - run: npm publish --provenance --access public
        if: steps.version.outputs.changed == 'true'
      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        run: gh release create "v${{ steps.version.outputs.new }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
